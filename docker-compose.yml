services:
  postgres:
    image: postgres:16-alpine
    container_name: sistema_publicidad_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sistemapublicidad_db
      POSTGRES_USER: Sistemas
      POSTGRES_PASSWORD: Sistemas2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: