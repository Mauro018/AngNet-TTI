services:
  postgres:
    image: postgres:16-alpine
    container_name: sistema_publicidad_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sistemapublicidad_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5434:5434"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: